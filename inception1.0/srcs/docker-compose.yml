services:
  mariadb:
    build:
      context: ./requirements/mariadb   # Build MariaDB image from this local Dockerfile context
    container_name: mariadb             # Fixed container name (instead of auto-generated)
    env_file:
      - .env                            # Load DB credentials/config from .env
    volumes:
      - mariadb_data:/var/lib/mysql     # Persist database data (MariaDB datadir)
    networks:
      - inception                       # Attach to the private "inception" bridge network
    restart: always                     # Restart policy
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin --protocol=socket --socket=/run/mysqld/mysqld.sock -uroot -p${MARIADB_ROOT_PASSWORD} ping --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s


  wordpress:
    build:
      context: ./requirements/wordpress # Build WordPress+PHP-FPM image from local context
    container_name: wordpress
    env_file:
      - .env                            # Load WP install vars and DB connection vars
    volumes:
      - wordpress_data:/var/www/html    # Persist WordPress files (core + wp-content)
    networks:
      - inception
    depends_on:
      mariadb:                         # Start MariaDB before WordPress (order and "ready" check)
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "php-fpm8.2 -t >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 20s

  nginx:
    build: requirements/nginx
    container_name: nginx
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: always
    env_file:
      - .env

networks:
  inception:
    name: inception                     # Explicit network name (stable across runs)
    driver: bridge                      # Bridge network for container-to-container communication

volumes:
  mariadb_data:
    name: mariadb_data                  # Explicit volume name
    driver: local
    driver_opts:
      type: none                        # Using a bind mount via local driver options
      o: bind                           # Bind-mount a host directory into the volume
      device: ${MARIADB_DATA_DIR}       # Host path from .env that stores MariaDB persistent data

  wordpress_data:
    name: wordpress_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORDPRESS_DATA_DIR}     # Host path from .env that stores WordPress persistent files