; wordpress.conf
; PHP-FPM pool config.
; Keep it minimal and listen on port 9000 for nginx to connect.

[www]
user = www-data
group = www-data

listen = 9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Log to container stdout/stderr where possible
catch_workers_output = yes

; A small hardening baseline
clear_env = no