; mariadb.cnf
; Minimal server config for container usage.
; - bind to all interfaces so other containers in the docker network can connect
; - keep it simple, no extra tuning

[mysqld]
bind-address=0.0.0.0
port=3306

; Use default datadir (/var/lib/mysql) which is a named volume
datadir=/var/lib/mysql

; Some sensible defaults
skip-host-cache
skip-name-resolve