# nginx.conf
# Minimal config:
# - Redirect HTTP -> HTTPS
# - TLS 1.2/1.3 only
# - Serve WP static files from /var/www/html
# - Forward PHP requests to wordpress:9000 (php-fpm)

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Basic logging (useful for debugging)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # Upstream: WordPress php-fpm container
    upstream wordpress_fpm {
        server wordpress:9000;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name mateferr.42.fr;

        # Always redirect to HTTPS
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name mateferr.42.fr;

        # TLS certs (generated by init_ng.sh)
        ssl_certificate     /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # TLS versions allowed by subject
        ssl_protocols TLSv1.2 TLSv1.3;

        # Reasonable defaults, keep it minimal
        ssl_prefer_server_ciphers on;

        root /var/www/html;
        index index.php index.html;

        # WordPress pretty permalinks support
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # PHP handling -> php-fpm
        location ~ \.php$ {
            include fastcgi_params;

            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            fastcgi_index index.php;
            fastcgi_pass wordpress_fpm;
        }

        # Deny access to hidden files like .htaccess
        location ~ /\. {
            deny all;
        }
    }
}