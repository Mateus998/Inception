services:
  mariadb:
    build:
      context: ./requirements/mariadb   # Build MariaDB image from this local Dockerfile context
    container_name: mariadb             # Fixed container name (instead of auto-generated)
    env_file:
      - .env                            # Load DB credentials/config from .env
    volumes:
      - mariadb_data:/var/lib/mysql     # Persist database data (MariaDB datadir)
    networks:
      - inception                       # Attach to the private "inception" bridge network
    restart: unless-stopped             # Restart policy: keep it running unless you stop it manually
    healthcheck:                        # Check if is everything good with the container
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  wordpress:
    build:
      context: ./requirements/wordpress # Build WordPress+PHP-FPM image from local context
    container_name: wordpress
    env_file:
      - .env                            # Load WP install vars and DB connection vars
    volumes:
      - wordpress_data:/var/www/html    # Persist WordPress files (core + wp-content)
    networks:
      - inception
    depends_on:
      mariadb:                         # Start MariaDB before WordPress (order and "ready" check)
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: ./requirements/nginx     # Build Nginx image (reverse proxy / TLS termination)
    container_name: nginx
    env_file:
      - .env                            # Often used for DOMAIN_NAME and config templating
    volumes:
      - wordpress_data:/var/www/html:ro # Mount WP files read-only so Nginx can serve static content
      - ./requirements/nginx/certs:/etc/nginx/certs:ro # Mount TLS cert/key into Nginx (read-only)
    ports:
      - "443:443"                       # Expose HTTPS on host port 443 -> container port 443
    networks:
      - inception
    depends_on:
      - wordpress                       # Start WordPress before Nginx (order only)
    restart: unless-stopped

networks:
  inception:
    name: inception                     # Explicit network name (stable across runs)
    driver: bridge                      # Bridge network for container-to-container communication

volumes:
  mariadb_data:
    name: mariadb_data                  # Explicit volume name
    driver: local
    driver_opts:
      type: none                        # Using a bind mount via local driver options
      o: bind                           # Bind-mount a host directory into the volume
      device: ${MARIADB_DATA_DIR}       # Host path from .env that stores MariaDB persistent data

  wordpress_data:
    name: wordpress_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORDPRESS_DATA_DIR}     # Host path from .env that stores WordPress persistent files