services:

  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    # Restart the container automatically if it crashes
    restart: always
    volumes:
      # Named volume for persistent database data
      - mariadb:/var/lib/mysql
    networks:
      - inception
    env_file:
      # Non-sensitive variables (db name, user, etc.)
      - .env
    secrets:
      - db_password
      - db_root_password

  wordpress:
    build: requirements/wordpress
    container_name: wordpress
    restart: always
    # WordPress must start after MariaDB is up
    depends_on:
      - mariadb
    volumes:
      # Named volume shared with NGINX for WordPress files
      - wordpress:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    secrets:
      - db_password
      - wp_adm_password
      - wp_password

  nginx:
    build: requirements/nginx
    container_name: nginx
    restart: always
    # NGINX must start after WordPress is up
    depends_on:
      - wordpress
    ports:
      # Only port 443 is exposed to the host — as required by the subject
      - "443:443"
    volumes:
      # Same volume as WordPress so NGINX can serve the PHP files
      - wordpress:/var/www/html
    networks:
      - inception

# Named volumes stored on the host under /home/<login>/data/
volumes:
  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      # This path is created by "make create_dirs"
      device: /home/${LOGIN}/data/mariadb
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress

# Custom network — containers communicate by service name
networks:
  inception:
    driver: bridge

# Docker secrets — read from files in secrets/ at repo root
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_adm_password:
    file: ../secrets/wp_adm_password.txt
  wp_password:
    file: ../secrets/wp_password.txt